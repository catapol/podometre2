<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accel Logger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --border: rgba(255,255,255,0.08);
    --text: #f0f0f0; --muted: #888; --accent: #00e5a0;
    --x: #4d9fff; --y: #00e5a0; --z: #ff6b4d; --m: #f5c842;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 16px; font-size: 13px; }
  h1 { font-size: 14px; font-weight: normal; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 8px; text-align: center; }
  .stat-box .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .stat-box .val { font-size: 18px; font-weight: bold; }
  .stat-box.x .val { color: var(--x); }
  .stat-box.y .val { color: var(--y); }
  .stat-box.z .val { color: var(--z); }
  .stat-box.m .val { color: var(--m); }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 16px; height: 200px; position: relative; }
  .legend { display: flex; gap: 12px; justify-content: center; margin-bottom: 8px; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 4px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .ctrl-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .ctrl-box label { font-size: 10px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 6px; }
  .slider-row { display: flex; align-items: center; gap: 8px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  .slider-val { font-size: 13px; color: var(--accent); min-width: 44px; text-align: right; }
  .buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  button { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Courier New', monospace; font-size: 12px; text-transform: uppercase; padding: 14px 8px; cursor: pointer; }
  button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity: 0.3; }
  button.rec-active { border-color: #ff4444; color: #ff4444; }
  button.success { border-color: var(--accent); color: var(--accent); }
  .counter { text-align: center; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .counter span { color: var(--accent); font-weight: bold; }
  .log-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; max-height: 160px; overflow-y: auto; font-size: 11px; color: var(--muted); line-height: 1.8; }
  .log-panel .ts { color: var(--accent); margin-right: 6px; }
  #hz-display { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 8px; }
  #hz-display span { color: var(--accent); }
</style>
</head>
<body>

<h1>&#9632; Accel Logger</h1>

<div class="stats-grid">
  <div class="stat-box x"><div class="lbl">X m/s²</div><div class="val" id="vx">—</div></div>
  <div class="stat-box y"><div class="lbl">Y m/s²</div><div class="val" id="vy">—</div></div>
  <div class="stat-box z"><div class="lbl">Z m/s²</div><div class="val" id="vz">—</div></div>
  <div class="stat-box m"><div class="lbl">Mag.</div><div class="val" id="vm">—</div></div>
</div>

<div id="hz-display">Fréquence réelle : <span id="hz-val">— Hz</span></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4d9fff"></div>X</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00e5a0"></div>Y</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b4d"></div>Z</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f5c842"></div>Magnitude</div>
</div>

<div class="chart-wrap">
  <canvas id="chart" role="img" aria-label="Graphique accéléromètre temps réel">Données accéléromètre.</canvas>
</div>

<div class="controls">
  <div class="ctrl-box">
    <label>Filtre passe-bas α</label>
    <div class="slider-row">
      <input type="range" id="alphaSlider" min="0.01" max="1" value="1" step="0.01" oninput="updateAlpha(this.value)">
      <span class="slider-val" id="alphaVal">1.00</span>
    </div>
  </div>
  <div class="ctrl-box">
    <label>Décimation (1 sur N)</label>
    <div class="slider-row">
      <input type="range" id="decSlider" min="1" max="10" value="1" step="1" oninput="updateDec(this.value)">
      <span class="slider-val" id="decVal">1</span>
    </div>
  </div>
</div>

<div class="buttons">
  <button id="btnPerm" onclick="startSensor()">&#9654; Démarrer</button>
  <button id="btnRec" onclick="toggleRec()" disabled>&#9679; Enregistrer</button>
  <button id="btnExport" onclick="exportCSV()" disabled>&#8595; CSV</button>
</div>

<div class="counter">Points enregistrés : <span id="countBadge">0</span></div>

<div class="log-panel" id="log">
  <div><span class="ts">&gt;</span> Clique Démarrer pour activer le capteur</div>
</div>

<script>
const MAX_PTS = 150;
let alpha = 1.0;
let decimation = 1;
let decCount = 0;
let recording = false;
let recordedData = [];
let filtered = { x: 0, y: 0, z: 0 };
let lastEventTime = 0;
let freqSamples = [];

const ctx = document.getElementById('chart').getContext('2d');
const emptyArr = () => Array(MAX_PTS).fill(null);
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: emptyArr(),
    datasets: [
      { label: 'X', data: emptyArr(), borderColor: '#4d9fff', borderWidth: 1.5, pointRadius: 0, tension: 0.2, fill: false },
      { label: 'Y', data: emptyArr(), borderColor: '#00e5a0', borderWidth: 1.5, pointRadius: 0, tension: 0.2, fill: false },
      { label: 'Z', data: emptyArr(), borderColor: '#ff6b4d', borderWidth: 1.5, pointRadius: 0, tension: 0.2, fill: false },
      { label: 'Mag', data: emptyArr(), borderColor: '#f5c842', borderWidth: 2, pointRadius: 0, tension: 0.2, fill: false }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false, animation: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { display: false },
      y: { min: -20, max: 20, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#666', font: { size: 10 }, callback: v => v.toFixed(0) } }
    }
  }
});

function addLog(msg) {
  const panel = document.getElementById('log');
  const now = new Date().toTimeString().slice(0, 8);
  const div = document.createElement('div');
  div.innerHTML = '<span class="ts">' + now + '</span>' + msg;
  panel.insertBefore(div, panel.firstChild);
}

function updateAlpha(v) { alpha = parseFloat(v); document.getElementById('alphaVal').textContent = alpha.toFixed(2); }
function updateDec(v) { decimation = parseInt(v); document.getElementById('decVal').textContent = v; }

function onMotion(e) {
  const now = performance.now();
  if (lastEventTime > 0) {
    const dt = now - lastEventTime;
    freqSamples.push(1000 / dt);
    if (freqSamples.length > 20) freqSamples.shift();
    const avgHz = freqSamples.reduce((a, b) => a + b, 0) / freqSamples.length;
    document.getElementById('hz-val').textContent = avgHz.toFixed(0) + ' Hz';
  }
  lastEventTime = now;

  decCount++;
  if (decCount % decimation !== 0) return;

  // Essaie les deux sources disponibles
  let rx = 0, ry = 0, rz = 0;
  const aGrav = e.accelerationIncludingGravity;
  const aPure = e.acceleration;

  if (aGrav && aGrav.x !== null) {
    rx = aGrav.x || 0; ry = aGrav.y || 0; rz = aGrav.z || 0;
  } else if (aPure && aPure.x !== null) {
    rx = aPure.x || 0; ry = aPure.y || 0; rz = aPure.z || 0;
  } else {
    addLog('Données nulles reçues');
    return;
  }

  filtered.x = alpha * rx + (1 - alpha) * filtered.x;
  filtered.y = alpha * ry + (1 - alpha) * filtered.y;
  filtered.z = alpha * rz + (1 - alpha) * filtered.z;
  const m = Math.sqrt(filtered.x ** 2 + filtered.y ** 2 + filtered.z ** 2);

  document.getElementById('vx').textContent = filtered.x.toFixed(2);
  document.getElementById('vy').textContent = filtered.y.toFixed(2);
  document.getElementById('vz').textContent = filtered.z.toFixed(2);
  document.getElementById('vm').textContent = m.toFixed(2);

  [filtered.x, filtered.y, filtered.z, m].forEach((v, i) => {
    chart.data.datasets[i].data.push(v);
    if (chart.data.datasets[i].data.length > MAX_PTS) chart.data.datasets[i].data.shift();
  });
  chart.update('none');

  if (recording) {
    recordedData.push({
      t: Date.now(),
      xb: rx.toFixed(4), yb: ry.toFixed(4), zb: rz.toFixed(4),
      xf: filtered.x.toFixed(4), yf: filtered.y.toFixed(4), zf: filtered.z.toFixed(4),
      m: m.toFixed(4)
    });
    document.getElementById('countBadge').textContent = recordedData.length;
  }
}

async function startSensor() {
  addLog('Activation capteur...');

  if (typeof DeviceMotionEvent === 'undefined') {
    addLog('ERREUR: DeviceMotionEvent absent');
    return;
  }
  addLog('DeviceMotionEvent OK');

  if (typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const res = await DeviceMotionEvent.requestPermission();
      addLog('Permission: ' + res);
      if (res !== 'granted') return;
    } catch (e) {
      addLog('Erreur permission: ' + e.message);
      return;
    }
  } else {
    addLog('Android: pas de permission requise');
  }

  window.addEventListener('devicemotion', onMotion, { passive: true });
  addLog('Listener actif — bouge le téléphone');

  setTimeout(() => {
    if (document.getElementById('vx').textContent === '—') {
      addLog('ATTENTION: aucune donnée après 2s');
      addLog('Vérifie: Paramètres > Apps > Chrome > Capteurs');
    } else {
      addLog('Capteur OK');
    }
  }, 2000);

  document.getElementById('btnPerm').textContent = '✓ Actif';
  document.getElementById('btnPerm').classList.add('success');
  document.getElementById('btnPerm').disabled = true;
  document.getElementById('btnRec').disabled = false;
}

function toggleRec() {
  recording = !recording;
  const btn = document.getElementById('btnRec');
  if (recording) {
    recordedData = [];
    btn.textContent = '◼ Arrêter';
    btn.classList.add('rec-active');
    document.getElementById('btnExport').disabled = true;
    addLog('Enregistrement démarré');
  } else {
    btn.textContent = '● Enregistrer';
    btn.classList.remove('rec-active');
    document.getElementById('btnExport').disabled = false;
    addLog('Arrêté — ' + recordedData.length + ' points');
  }
}

function exportCSV() {
  if (!recordedData.length) { addLog('Aucune donnée'); return; }
  const header = 'timestamp_ms,x_brut,y_brut,z_brut,x_filtre,y_filtre,z_filtre,magnitude\n';
  const rows = recordedData.map(r => `${r.t},${r.xb},${r.yb},${r.zb},${r.xf},${r.yf},${r.zf},${r.m}`).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'accel_' + Date.now() + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  addLog('CSV exporté — ' + recordedData.length + ' lignes');
}
</script>
</body>
</html>
